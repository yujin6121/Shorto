<div class="create-hero">
  <h1>URL 단축하기</h1>

  <div class="card create-card">
    <form id="createForm" class="create-form" autocomplete="off">
      <div class="form-group">
        <label>긴 주소</label>
        <input id="urlInput" type="url" class="form-control form-control-lg" placeholder="예: https://example.com/very/long/url" required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>사용 도메인</label>
          <div id="domainPicker" class="domain-picker"></div>
        </div>
        <div class="form-group">
          <label>커스텀 주소</label>
          <input id="customCodeInput" type="text" class="form-control" placeholder="예: my-post-1" pattern="[a-zA-Z0-9-_]+" title="영문, 숫자, 하이픈, 언더스코어만 가능합니다">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>만료일</label>
          <input id="expiresAtInput" type="text" class="form-control" placeholder="예: 2026-05-31" inputmode="numeric">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; height: 54px; font-size: 16px; margin-top: 10px;">URL 단축하기</button>
    </form>

    <div id="result" class="result-box" style="display:none;">
      <div id="resultLinks" class="result-links"></div>
      <button id="copyButton" class="btn btn-secondary">복사</button>
    </div>
  </div>
</div>
